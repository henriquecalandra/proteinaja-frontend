name: Server Setup (run once)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Install Docker, clone repos and open firewall
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 20m
          script: |
            set -e

            # Docker
            if ! command -v docker &>/dev/null; then
              sudo dnf config-manager --add-repo=https://download.docker.com/linux/centos/docker-ce.repo
              sudo dnf install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin git
              sudo systemctl enable --now docker
              sudo usermod -aG docker opc
            fi

            # Firewall
            sudo firewall-cmd --permanent --add-port=80/tcp  2>/dev/null || true
            sudo firewall-cmd --permanent --add-port=443/tcp 2>/dev/null || true
            sudo firewall-cmd --reload 2>/dev/null || true

            # Clone repos (skip if already exist)
            cd /home/opc
            [ -d proteinaja-backend ]  || git clone https://github.com/henriquecalandra/proteinaja-backend.git
            [ -d proteinaja-frontend ] || git clone https://github.com/henriquecalandra/proteinaja-frontend.git

            # Create .env with working defaults if missing
            ENV_FILE=/home/opc/proteinaja-backend/.env
            if [ ! -f "$ENV_FILE" ]; then
              printf '%s\n' \
                'POSTGRES_USER=proteinaja' \
                'POSTGRES_PASSWORD=trocar_em_producao' \
                'POSTGRES_DB=proteinaja_db' \
                'DATABASE_URL=postgresql://proteinaja:trocar_em_producao@postgres:5432/proteinaja_db' \
                'EVOLUTION_API_KEY=trocar_em_producao' \
                'EVOLUTION_API_URL=http://evolution-api:8080' \
                'EVOLUTION_INSTANCE_NAME=frigorifico_sao_lucas' \
                'GROQ_API_KEY=gsk_SUBSTITUA_AQUI' \
                'JWT_SECRET=substitua_por_um_secret_longo_e_aleatorio' \
                'JWT_ALGORITHM=HS256' \
                'JWT_EXPIRE_HOURS=24' \
                'FRIGORIFICO_NOME=Frigorifico Sao Lucas' \
                'FRIGORIFICO_CIDADE=Goias' \
                > "$ENV_FILE"
              echo ".env criado com valores padrao"
            fi

            # Start all containers
            cd /home/opc/proteinaja-backend
            sudo docker compose up -d --build

            echo "=== Setup complete ==="
            sudo docker --version
            sudo docker compose ps
